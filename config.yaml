  - name: "Security Affairs"
    type: rss
    url: "https://securityaffairs.com/feed"
    category: "high"
    region: "해외"

  # 2026-07-07 추가 (feedparser 실fetch 검증) — AI보안·위협인텔·실무 축 보강
  # AI/ML 취약점 공개(huntr 연계) — 사용자 AI기업보안트랙 직결
  - name: "Protect AI"
    type: rss
    url: "https://protectai.com/blog/rss.xml"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "ai"
    region: "해외"

  # 위협 인텔·멀웨어 분석 — 공격 체인 다이어그램이 유의미해 카드 이미지로 씀
  # (직접 RSS는 봇 UA에 403 → feedburner 미러가 안정적으로 열림)
  - name: "Cisco Talos"
    type: rss
    url: "https://feeds.feedburner.com/feedburner/Talos"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "high"
    card_image: true
    region: "해외"

  # 2026-07-10 추가 (feedparser 실fetch 검증) — 위협 리서치·정부 권고 축 보강
  # 국내 벤더 위협 리서치(멀웨어 분석) — 국내 관점 보강
  - name: "AhnLab ASEC"
    type: rss
    url: "https://asec.ahnlab.com/en/feed/"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "research"
    card_image: true
    region: "국내"

  # APT·멀웨어 심층분석 — Unit42/Talos급 위협 리서치
  - name: "Kaspersky Securelist"
    type: rss
    url: "https://securelist.com/feed/"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "research"
    card_image: true
    region: "해외"

  # 영국 정부 공식 보안 권고문 — CISA KEV/KISA와 같은 결의 공식 발표 축.
  # 갱신이 주 1~2건뿐이라 전역 14일 게이트에 걸리면 조용한 주 전체가
  # 빈다(2026-07-10 실측: 최신글도 14일 컷오프 밖) — Krebs/Talos와
  # 같은 이유로 신선도 게이트 제외
  - name: "NCSC-UK"
    type: rss
    url: "https://www.ncsc.gov.uk/api/1/services/v1/news-rss-feed.xml"
    max_age_days: false
    category: "critical"
    region: "해외"

  - name: "Google Security Blog"
    type: rss
    url: "https://security.googleblog.com/feeds/posts/default"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "research"
    region: "해외"

  # 일일 실무 핸들러 다이어리 — 실전 위협·IOC 중심
  - name: "SANS ISC"
    type: rss
    url: "https://isc.sans.edu/rssfeed_full.xml"
    category: "news"
    region: "해외"

  # AI 벤더(Anthropic/OpenAI/Gemini) 보안 이슈만 — 벤더 원본 블로그는 제품·
  # 마케팅 글이 대부분이라(Anthropic은 RSS 자체 없음) 구글뉴스 보안 쿼리로
  # 좁혀 수집한다. 링크는 구글뉴스 리다이렉트라 카드 이미지는 안 붙는다
  - name: "AI 벤더 보안뉴스"
    type: rss
    url: "https://news.google.com/rss/search?q=%28Anthropic%20OR%20OpenAI%20OR%20Gemini%29%20%28jailbreak%20OR%20vulnerability%20OR%20%EB%B3%B4%EC%95%88%20OR%20safety%29&hl=ko&gl=KR&ceid=KR:ko"
    category: "ai"
    region: "해외"
    # 구글뉴스 쿼리는 대량·노이즈라 첫 실행 백로그 홍수 방지용 최근분 제한
    max_age_days: 5

  # 금융보안원 — 공식 RSS가 없어 구글뉴스 쿼리로 대체(기관 관련 보안뉴스).
  # 금융권 특화 축(사용자 목표: 금융권 AI보안). 금결원/금감원은 보안 비중이
  # 낮아 제외했다(사용자 결정)
  - name: "금융보안원"
    type: rss
    url: "https://news.google.com/rss/search?q=%22%EA%B8%88%EC%9C%B5%EB%B3%B4%EC%95%88%EC%9B%90%22&hl=ko&gl=KR&ceid=KR:ko"
    category: "news"
    region: "국내"
    # 구글뉴스 쿼리는 대량·노이즈라 첫 실행 백로그 홍수 방지용 최근분 제한
    max_age_days: 5

  # 금융보안원 게시판 원문 크롤러 — 공식 RSS가 없어 프런트가 쓰는 AJAX
  # (POST /bbs/list) 백엔드를 직접 호출한다(2026-07-07 실측). 위 구글뉴스
  # 소스가 '금융보안원 관련 언론보도'라면 이쪽은 발간물·보고서·보도자료
  # '원문'을 잡는다. boards menuNo(실측): 242 Digital Finance Insight,
  # 241 인사이트 리포트, 244·1006·1011 인텔리전스/위협분석 보고서,
  # 1009 취약점 공개(FVE), 253 보도자료(기획부). 저빈도 게시판이라
  # max_age_days로 최근분만 싣는다(첫 실행 백로그 홍수 방지)
  - name: "금융보안원"
    type: fsec
    base_url: "https://www.fsec.or.kr"
    boards: [242, 241, 244, 1006, 1011, 1009, 253]
    category: "news"
    region: "국내"
    max_age_days: 21

  # 금융감독원 — 표준 eGovFrame 게시판이라 list.do가 정적 HTML로 온다
  # (2026-07-07 실측). WAF가 봇 UA/HTTP2를 끊어 sources/fss.py는 브라우저
  # UA로 요청한다. 보도자료(B0000188/200218)와 정보기술 IT(B0000087/200116)만
  # 크롤링 — 후자는 금융 IT·보안 직결. 목록에 본문이 없어 summary는 제목 기반,
  # summary_ko는 librarian이 생성. 저빈도라 max_age_days로 최근분만 싣는다
  - name: "금융감독원"
    type: fss
    base_url: "https://www.fss.or.kr"
    boards:
      - { bbs: "B0000188", menu: "200218" }   # 보도자료
      - { bbs: "B0000087", menu: "200116" }   # 정보기술(IT)
    category: "news"
    region: "국내"
    max_age_days: 21

  # ---- 속보 소스 (breaking: true) — 즉시 발송 판정(judge) 전용 ----
  # 대형 사건은 언론 기사보다 HN/레딧에 먼저 뜬다. 이 소스들은 아침
  # 다이제스트/카드뉴스에 실리지 않고, judge가 긴급 판정한 것만 즉시
  # 발송된다 (비긴급 판정분은 버림 — 실제 사건이면 뉴스 소스로 후속
  # 보도가 온다). 레딧 RSS는 데이터센터 IP를 간헐 차단할 수 있음 —
  # 소스별 fail-open이라 run은 안 깨진다.
  - name: "Hacker News"
    type: hn
    category: "news"
    # 150은 포인트 축적까지 수 시간 걸려 속보성이 죽는다 — 대형 사건은
    # 1~2시간 내 100+ 도달. 노이즈 증가분은 judge LLM이 최종 거른다
    min_points: 100
    breaking: true
    region: "해외"

  # 멀티레딧으로 한 요청에 — 서브레딧별 개별 요청은 레딧 rate limit(429)에 걸린다
  - name: "Reddit 보안 커뮤니티"
    type: rss
    url: "https://www.reddit.com/r/cybersecurity+netsec/hot/.rss?limit=40"
    category: "news"
    breaking: true
    region: "해외"

  # 국내 속보 — 국내 대형사고(쿠팡·SKT급)는 언론 보도가 가장 빠르다.
  # 사건·사고 어휘 검색이라 노이즈가 많지만 breaking 소스는 어차피
  # judge 긴급 판정분만 발송되고 나머지는 버려진다
  - name: "국내 사건 속보"
    type: rss
    url: "https://news.google.com/rss/search?q=%ED%95%B4%ED%82%B9%20OR%20%EC%9C%A0%EC%B6%9C%20OR%20%EB%9E%9C%EC%84%AC%EC%9B%A8%EC%96%B4&hl=ko&gl=KR&ceid=KR:ko"
    category: "news"
    breaking: true
    region: "국내"
    max_age_days: 1

# judge scale(파장 자기평가 1~5) 하한 — 이 값 미만은 LLM이 긴급이라 해도
# 코드에서 탈락시킨다(이중 게이트). 5 = 국가적/글로벌 파장만. 긴급 알림이
# 너무 조용하면 4로 낮춰 업계 전체 파장까지 허용
urgent_min_scale: 5

# v8 즉시 발송 1차 게이트 — 이 키워드가 제목/요약에 있어야 LLM 판정
# 후보가 된다 (사건·사고 어휘만; 최종 선별은 judge.py의 sonnet이 한다)
urgent_gate:
  - 유출
  - 해킹
  - 침해
  - 탈취
  - 마비
  - 피해
  - breach
  - leak
  - hacked
  - compromised
  - stolen
  - exfiltrat
  - mass exploitation
  - under active exploitation

# 전역 신선도 게이트: 카드뉴스 = 동향 추적이므로 오래된 기사(재게시·후속
# 보도가 끌어올린 역주행 원문)를 전 소스에서 거른다. 소스별 max_age_days가
# 있으면 그 값이 우선하고, max_age_days: false(또는 0)이면 필터를 끈다
# (릴리스/논문 atom 등 오래돼도 유효한 피드용). rss/fsec/fss에 적용.
default_max_age_days: 14

# 특정 기자/작성자 후순위 — 신뢰도 이슈로 카드 우선순위를 낮춘다.
# 피드 author 바이라인이 author_contains를 포함하면 사서가 매긴 importance에서
# penalty만큼 감점한다(최소 1). 완전 제외가 아니라 강등이라 importance가 충분히
# 높은 대형 사건이면 카드에 살아남을 수 있다. source 지정 시 해당 소스에만 적용.
deprioritize_authors:
  - source: "보안뉴스"
    author_contains: "지진솔"   # 2026-07-09 클로드코드 유출 오보 계기(사용자 결정)
    penalty: 2

# cap on individual cards (urgent items) per run; the digest embed is not
# capped here since it already truncates itself per category. Overflow is
# still recorded in seen.json so it is not re-sent next run
# (env MAX_ITEMS_PER_RUN overrides this)
max_items_per_run: 25

# 아침 다이제스트 카드·링크에 싣는 항목 상한 — 나머지는 위키에만 적립된다.
# 선별은 순위 채움(rank-fill): 사서 importance(1~5) 내림차순, 동점은
# heuristic_score로 갈라 뉴스·CVE 각각의 상한까지 항상 채운다. 하드 게이트
# (구 digest_min_importance)는 폐기 — 조용한 날 카드가 1~2장으로 쪼그라드는
# 문제를 막고 매일 뉴스 7건을 보장한다(recap 제외로 후보가 모자라면 있는 만큼).
# 뉴스 7 = 표지1+뉴스7+CVE목록1 = 총 9장(사용자 결정, 첨부 상한 10 이내),
# CVE 10 = '오늘의 CVE' 목록 카드 1장의 행 상한(LIST_ROWS)과 동일
max_news_items: 7
max_cve_items: 10

# 사서(LLM 위키 사서)에 넘길 뉴스 후보 상한 — 전 항목 판정은 전역 예산
# (librarian.DEADLINE_SECONDS)을 구조적으로 초과해 뉴스 무판정 유실을
# 재발시킨다(2026-07-12: 171건 입력 → 119건 유실 → 뉴스 카드 0장 발행).
# 휴리스틱 상위 이 건수만 판정받고, 초과분은 pending 이월(TTL이 청소).
# CVE는 별도로 max_cve_items건만 결정적으로 선발돼 사서 입력에 합류한다.
# 논문(paper)은 카드 부적합이라 사서·카드 모두 제외.
librarian_news_cap: 60

# digest에서 이월(pending) 항목의 수명(일) — seen 최초 목격 기준.
# 카드뉴스는 일간 동향이라 이보다 오래 이월된 무판정 꼬리는 소진한다
# (pending 무한 누적 → 사서 예산 재초과 방지)
pending_ttl_days: 3

# 인스타그램/쓰레드 크로스포스트 — 토큰·계정 ID는 GitHub secrets(env)로만
# 공급한다(IG_USER_ID/IG_ACCESS_TOKEN/THREADS_USER_ID/THREADS_ACCESS_TOKEN).
# 어느 플랫폼이 실패해도 디스코드 발송·상태 저장에는 영향 없음(fail-open).
crosspost:
  instagram:
    enabled: true
  threads:
    enabled: true
  # 사서 키워드 해시태그 뒤에 붙는 고정 태그
  hashtags: [보안뉴스, 사이버보안, 카드뉴스]

discord:
  # embed color mapping (hex ints)
  colors:
    critical: 0xE74C3C
    high: 0xF1C40F
    research: 0x3498DB
    ai: 0x9B59B6
    news: 0x95A5A6
    paper: 0x2ECC71

nvd_filter:
  min_cvss: 8.0
  keywords:
    - "llm"
    - "machine learning"
    - "pytorch"
    - "langchain"
    - "openssl"
