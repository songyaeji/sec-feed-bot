    url: "https://googleprojectzero.blogspot.com/feeds/posts/default"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "research"
    card_image: true
    region: "해외"

  - name: "KISA 보안공지 (보호나라)"
