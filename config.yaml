  - name: "Security Top-tier Papers"
    type: dblp
    category: "paper"
    streams:
      ccs: "ACM CCS"
      sp: "IEEE S&P"
      uss: "USENIX Security"
      ndss: "NDSS"
    region: "해외"

  - name: "Krebs on Security"
    type: rss
    url: "https://krebsonsecurity.com/feed/"
    max_age_days: false  # 연구/벤더/릴리스 피드 — 오래돼도 유효, 전역 신선도 게이트 제외
    category: "research"
    card_image: true
    region: "해외"

  - name: "The Hacker News"
    type: rss
    url: "https://feeds.feedburner.com/TheHackersNews"
    category: "high"
    card_image: true
    region: "해외"

  # 2026-07-07 추가 (URL 실fetch 검증) — 해외 보안 뉴스 축 보강
  - name: "GBHackers"
    type: rss
    url: "https://gbhackers.com/feed/"
    category: "high"
