# URL은 2026-07-06 실제 fetch로 전건 검증됨
# (knvd.krcert.or.kr RSS는 404 — 보호나라 rss.do가 KISA 보안공지 공식 피드)

# region: 카드뉴스에 국내/해외 표기로 실린다 (미지정 시 표기 생략)
sources:
  # v8: urgent(소스 단위 즉시 발송) 플래그 폐기 — 즉시 발송은 judge.py의
  # 대형 사건 판정만 태운다. KEV·KISA 공지도 아침 다이제스트로 간다
  - name: "CISA KEV"
    type: kev
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    category: "critical"
    region: "해외"

  - name: "NVD"
    type: nvd
    url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    category: "high"
    region: "해외"

  - name: "Project Zero Blog"
    type: rss
    url: "https://googleprojectzero.blogspot.com/feeds/posts/default"
    category: "research"
    card_image: true
    region: "해외"

  - name: "KISA 보안공지 (보호나라)"
    type: rss
    url: "https://www.boho.or.kr/kr/rss.do?bbsId=B0000133"
    category: "critical"
    region: "국내"

  - name: "보안뉴스"
    type: rss
    url: "http://www.boannews.com/media/news_rss.xml"
    category: "news"
    region: "국내"

  - name: "데일리시큐"
    type: rss
    url: "https://www.dailysecu.com/rss/allArticle.xml"
    category: "news"
    region: "국내"

  - name: "Unit 42"
    type: rss
    url: "https://unit42.paloaltonetworks.com/feed/"
    category: "research"
    card_image: true  # 공격 체인 다이어그램 등 유의미한 이미지가 실림
    region: "해외"

  - name: "OWASP GenAI Security"
    type: rss
    url: "https://github.com/OWASP/www-project-top-10-for-large-language-model-applications/releases.atom"
    category: "ai"
    region: "해외"

  - name: "Security Top-tier Papers"
    type: dblp
    category: "paper"
    streams:
      ccs: "ACM CCS"
      sp: "IEEE S&P"
      uss: "USENIX Security"
      ndss: "NDSS"
    region: "해외"

  - name: "Krebs on Security"
    type: rss
    url: "https://krebsonsecurity.com/feed/"
    category: "research"
    card_image: true
    region: "해외"

  - name: "The Hacker News"
    type: rss
    url: "https://feeds.feedburner.com/TheHackersNews"
    category: "high"
    card_image: true
    region: "해외"

  # 2026-07-07 추가 (URL 실fetch 검증) — 해외 보안 뉴스 축 보강
  - name: "GBHackers"
    type: rss
    url: "https://gbhackers.com/feed/"
    category: "high"
    region: "해외"

  - name: "Security Affairs"
    type: rss
    url: "https://securityaffairs.com/feed"
    category: "high"
    region: "해외"

  # 2026-07-07 추가 (feedparser 실fetch 검증) — AI보안·위협인텔·실무 축 보강
  # AI/ML 취약점 공개(huntr 연계) — 사용자 AI기업보안트랙 직결
  - name: "Protect AI"
    type: rss
    url: "https://protectai.com/blog/rss.xml"
    category: "ai"
    region: "해외"

  # 위협 인텔·멀웨어 분석 — 공격 체인 다이어그램이 유의미해 카드 이미지로 씀
  # (직접 RSS는 봇 UA에 403 → feedburner 미러가 안정적으로 열림)
  - name: "Cisco Talos"
    type: rss
    url: "https://feeds.feedburner.com/feedburner/Talos"
    category: "high"
    card_image: true
    region: "해외"

  - name: "Google Security Blog"
    type: rss
    url: "https://security.googleblog.com/feeds/posts/default"
    category: "research"
    region: "해외"

  # 일일 실무 핸들러 다이어리 — 실전 위협·IOC 중심
  - name: "SANS ISC"
    type: rss
    url: "https://isc.sans.edu/rssfeed_full.xml"
    category: "news"
    region: "해외"

  # AI 벤더(Anthropic/OpenAI/Gemini) 보안 이슈만 — 벤더 원본 블로그는 제품·
  # 마케팅 글이 대부분이라(Anthropic은 RSS 자체 없음) 구글뉴스 보안 쿼리로
  # 좁혀 수집한다. 링크는 구글뉴스 리다이렉트라 카드 이미지는 안 붙는다
  - name: "AI 벤더 보안뉴스"
    type: rss
    url: "https://news.google.com/rss/search?q=%28Anthropic%20OR%20OpenAI%20OR%20Gemini%29%20%28jailbreak%20OR%20vulnerability%20OR%20%EB%B3%B4%EC%95%88%20OR%20safety%29&hl=ko&gl=KR&ceid=KR:ko"
    category: "ai"
    region: "해외"

  # 금융보안원 — 공식 RSS가 없어 구글뉴스 쿼리로 대체(기관 관련 보안뉴스).
  # 금융권 특화 축(사용자 목표: 금융권 AI보안). 금결원/금감원은 보안 비중이
  # 낮아 제외했다(사용자 결정)
  - name: "금융보안원"
    type: rss
    url: "https://news.google.com/rss/search?q=%22%EA%B8%88%EC%9C%B5%EB%B3%B4%EC%95%88%EC%9B%90%22&hl=ko&gl=KR&ceid=KR:ko"
    category: "news"
    region: "국내"

  # ---- 속보 소스 (breaking: true) — 즉시 발송 판정(judge) 전용 ----
  # 대형 사건은 언론 기사보다 HN/레딧에 먼저 뜬다. 이 소스들은 아침
  # 다이제스트/카드뉴스에 실리지 않고, judge가 긴급 판정한 것만 즉시
  # 발송된다 (비긴급 판정분은 버림 — 실제 사건이면 뉴스 소스로 후속
  # 보도가 온다). 레딧 RSS는 데이터센터 IP를 간헐 차단할 수 있음 —
  # 소스별 fail-open이라 run은 안 깨진다.
  - name: "Hacker News"
    type: hn
    category: "news"
    min_points: 150
    breaking: true
    region: "해외"

  # 멀티레딧으로 한 요청에 — 서브레딧별 개별 요청은 레딧 rate limit(429)에 걸린다
  - name: "Reddit 보안 커뮤니티"
    type: rss
    url: "https://www.reddit.com/r/cybersecurity+netsec/hot/.rss?limit=40"
    category: "news"
    breaking: true
    region: "해외"

# v8 즉시 발송 1차 게이트 — 이 키워드가 제목/요약에 있어야 haiku 판정
# 후보가 된다 (사건·사고 어휘만; 최종 선별은 judge.py의 LLM이 한다)
urgent_gate:
  - 유출
  - 해킹
  - 침해
  - 탈취
  - 마비
  - 피해
  - breach
  - leak
  - hacked
  - compromised
  - stolen
  - exfiltrat
  - mass exploitation
  - under active exploitation

# cap on individual cards (urgent items) per run; the digest embed is not
# capped here since it already truncates itself per category. Overflow is
# still recorded in seen.json so it is not re-sent next run
# (env MAX_ITEMS_PER_RUN overrides this)
max_items_per_run: 25

discord:
  # embed color mapping (hex ints)
  colors:
    critical: 0xE74C3C
    high: 0xF1C40F
    research: 0x3498DB
    ai: 0x9B59B6
    news: 0x95A5A6
    paper: 0x2ECC71

nvd_filter:
  min_cvss: 8.0
  keywords:
    - "llm"
    - "machine learning"
    - "pytorch"
    - "langchain"
    - "openssl"
    - "windows"
    - "linux kernel"
    - "artificial intelligence"
    - "neural network"
    - "tensorflow"
    - "hugging face"
    - "openai"

tags:
  금융: [금융, 은행, 뱅킹, 핀테크, 증권, 보험, 카드사, 결제, 페이, banking, fintech, financial, swift, atm]
  AI: [llm, prompt injection, 생성형, 인공지능, machine learning, neural, deepfake, 딥페이크]
  RCE: [remote code execution, rce, 원격 코드]
  제로데이: [zero-day, 0-day, 제로데이, in the wild]
  랜섬웨어: [ransomware, 랜섬웨어]
  APT: [apt, 국가배후, state-sponsored, lazarus, kimsuky]
  피싱: [phishing, 피싱, smishing, 스미싱]
