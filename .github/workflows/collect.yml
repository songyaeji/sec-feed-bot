name: Collect security feeds

on:
  schedule:
    - cron: '*/20 * * * *'   # realtime fallback (primary = cron-job.org 10min dispatch, docs/external-trigger.md)
    - cron: '50 21 * * *'    # digest: KST 07:00 (UTC+9), 10 min early for Actions delay
  workflow_dispatch:
    inputs:
      mode:
        description: 'run mode'
        default: 'realtime'
        type: choice
        options: [realtime, digest]
      # 시간창(KST 06~12시) 밖 의도적 digest 발행용 — 사람이 Actions UI/CLI로
      # 명시할 때만 true. cron-job.org payload에는 절대 넣지 않는다
      # (payload 오설정이 자정 오발행 사고 원인이었으므로 기본 false 유지)
      allow_offhour:
        description: 'digest 시간창 밖 발행 허용 (수동 재발송용)'
        default: false
        type: boolean
      # 같은 날 digest 재발행(검증·사고 복구용) — last_digest_date 가드와
      # 시간창 가드를 함께 우회한다. state를 되감는 방식은 merge_state의
      # max() union 레이스로 무산되므로(2026-07-13 실측) 이 플래그를 쓴다.
      # 사람이 명시할 때만 true — cron-job.org payload에는 절대 넣지 않는다
      force_digest:
        description: 'digest 강제 재발행 (이중발행 가드 우회)'
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # hang이 concurrency 그룹(group: collect)을 GitHub 6h 상한까지 점유해
    # 이후 모든 run을 동결시키는 사고 방지(2026-07-10 digest 1h23m hang).
    # digest 정상 소요는 수 분 — 30분이면 충분한 여유. librarian 전역
    # 예산(DEADLINE_SECONDS)과 이중 방어.
    timeout-minutes: 38
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: run_mode
        env:
          # 표현식을 스크립트 본문에 직접 보간하지 않는다(스크립트 인젝션
          # 방어 — github.event.* 값은 env로만 받는 것이 GitHub 권장)
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          # digest cron -> digest; workflow_dispatch -> the chosen input;
          # anything else (the */20 realtime cron) -> realtime
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "$DISPATCH_MODE" in
              realtime|digest) echo "mode=$DISPATCH_MODE" >> "$GITHUB_OUTPUT" ;;
              *) echo "mode=realtime" >> "$GITHUB_OUTPUT" ;;
            esac
          elif [ "${{ github.event.schedule }}" = "50 21 * * *" ]; then
            echo "mode=digest" >> "$GITHUB_OUTPUT"
          else
            echo "mode=realtime" >> "$GITHUB_OUTPUT"
          fi

      # v8: realtime에서도 필요 — judge.py(대형 사건 즉시 발송 판정)가
      # 매 run 후보가 있을 때 sonnet을 호출한다. digest는 사서(librarian)용.
      - name: Install Claude Code CLI (judge + wiki librarian)
        run: npm install -g @anthropic-ai/claude-code

      # 카드뉴스 렌더용 chromium은 digest에서만 필요. 브라우저 바이너리
      # (~150MB) 매일 재다운로드를 피하려고 캐시 — playwright 버전이 바뀌면
      # requirements.txt 해시도 바뀌어 캐시 키가 자연히 무효화된다
      - name: Cache Playwright browsers (digest card news)
        if: steps.run_mode.outputs.mode == 'digest'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      # --with-deps: 러너에 chromium 런타임 시스템 라이브러리까지 설치
      # (캐시 히트여도 apt 의존성은 러너마다 새로 필요)
      - name: Install Playwright chromium (digest card news)
        if: steps.run_mode.outputs.mode == 'digest'
        run: playwright install --with-deps chromium

      # CLI가 CLAUDE_CODE_OAUTH_TOKEN env를 직접 읽지 않아(2.1.201 실측)
      # setup-token 토큰을 credentials 파일로 구체화해야 구독 인증이 붙는다
      - name: Set up Claude auth (judge + wiki librarian)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "token secret 없음 — librarian은 fail-open으로 스킵됨"
            exit 0
          fi
          mkdir -p ~/.claude
          python3 - <<'PY'
          import json, os, time
          cred = {"claudeAiOauth": {
              "accessToken": os.environ["CLAUDE_CODE_OAUTH_TOKEN"],
              # setup-token 토큰은 1년 유효 — 파일의 expiresAt은 CLI 캐시 판단용
              "expiresAt": int(time.time() * 1000) + 300 * 86400 * 1000,
              "scopes": ["user:inference", "user:profile"],
              "subscriptionType": "pro"}}
          path = os.path.expanduser("~/.claude/.credentials.json")
          with open(path, "w") as f:
              json.dump(cred, f)
          os.chmod(path, 0o600)
          print("credentials 파일 생성됨")
          PY

      # 이중발행 race 방어 — concurrency 큐에서 대기하던 run의 checkout이
      # 직전 run의 state push와 초 단위로 엇갈리면 last_digest_date 가드가
      # 옛 state를 보고 뚫린다(2026-07-12: NO.5 이중 발행, 00:23/00:42).
      # 수집 직전에 origin 최신 state를 다시 당겨 race 창을 없앤다.
      - name: Sync latest state (double-publish race guard)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run collector
        # step 단위 timeout — job timeout(30분)으로 죽으면 job이 cancelled로
        # 끝나 아래 failure() 알림이 못 돈다. step 초과는 step failure라
        # 알림이 실행된다. librarian 전역 예산(1500s)+청크 300s 최악 ≈ 30분
        # 이므로 33분이면 정상 경로를 절대 안 자른다.
        timeout-minutes: 33
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          RUN_MODE: ${{ steps.run_mode.outputs.mode }}
          # 'true'일 때만 main.py 시간창 가드 우회 — workflow_dispatch 수동
          # 재발송 전용(위 allow_offhour input 주석 참조)
          ALLOW_OFFHOUR_DIGEST: ${{ github.event.inputs.allow_offhour == 'true' && '1' || '' }}
          # 같은 날 강제 재발행 — 사람이 workflow_dispatch로 명시할 때만 '1'
          FORCE_DIGEST: ${{ github.event.inputs.force_digest == 'true' && '1' || '' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 인스타/쓰레드 크로스포스트 — secret 미등록이면 빈 값이 되고
          # crosspost.py가 해당 플랫폼을 건너뛴다(digest 모드에서만 사용)
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python main.py

      - name: Commit updated state
        run: |
          # seen.json (dedup ledger), pending.json (queued non-urgent
          # backlog), and wiki/ (librarian's topic pages -- possibly new,
          # untracked files) all change run-to-run; stage first so new
          # wiki pages are picked up, then skip the commit entirely when
          # there's nothing staged, to avoid empty commits
          git add state/seen.json state/pending.json wiki/
          # 긴급 발송 이력(후속 보도 재울림 차단 컨텍스트) — 첫 긴급 발송
          # 전에는 파일이 없어서 무조건 add하면 pathspec 에러가 난다
          if [ -f state/urgent_history.json ]; then
            git add state/urgent_history.json
          fi
          if git diff --cached --quiet; then
            echo "No state changes, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # A concurrent writer (an overlapping cron run or a direct local
          # push) may have advanced origin/main. git's line-based rebase can't
          # auto-merge the JSON state files and aborts with a CONFLICT, so
          # instead of `pull --rebase` we re-base our changes onto the latest
          # origin/main without a textual replay: `git reset --mixed` moves
          # HEAD and the index to origin/main (so unrelated files that advanced
          # on main are kept, not reverted) while leaving this run's state/wiki
          # edits in the working tree, then merge_state.py union-merges the JSON
          # state files at the data level -- guaranteeing no seen id / pending
          # item from either writer is lost.
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --mixed origin/main
            python merge_state.py origin/main
            git add state/seen.json state/pending.json wiki/
            if [ -f state/urgent_history.json ]; then
              git add state/urgent_history.json
            fi
            if git diff --cached --quiet; then
              echo "No net state changes after merge, skipping commit."
              exit 0
            fi
            git commit -m "chore: update seen.json/pending.json/wiki [skip ci]"
            if git push; then
              exit 0
            fi
            echo "push attempt $attempt failed"
          done
          exit 1

      # 다이제스트 발송 성공 시 main.py가 out/trend/(카드 PNG + meta.json)를
      # 남긴다. 이를 포트폴리오 repo로 push하면 해당 repo의 deploy 워크플로가
      # 자동 재빌드해 https://songyaeji.github.io/trend/ 에 게시된다.
      # PORTFOLIO_PUSH_TOKEN: fine-grained PAT — 대상 songyaeji.github.io 한정,
      # Contents Read/Write. 미등록이면 게시만 건너뛴다(Discord 발송은 이미 완료).
      # 토큰은 로그에 출력하지 않는다(Actions 자동 마스킹 + echo 금지).
      - name: Publish card news to portfolio (Trend tab)
        if: steps.run_mode.outputs.mode == 'digest'
        env:
          PORTFOLIO_PUSH_TOKEN: ${{ secrets.PORTFOLIO_PUSH_TOKEN }}
        run: |
          if [ ! -f out/trend/meta.json ]; then
            echo "out/trend 없음(카드뉴스 미발송 또는 텍스트 폴백) — 게시 스킵"
            exit 0
          fi
          if [ -z "$PORTFOLIO_PUSH_TOKEN" ]; then
            echo "PORTFOLIO_PUSH_TOKEN secret 미등록 — 게시 스킵"
            exit 0
          fi
          DATE=$(python3 -c "import json; print(json.load(open('out/trend/meta.json'))['date'])")
          ISSUE=$(python3 -c "import json; print(json.load(open('out/trend/meta.json'))['issue_no'])")
          # 공개 repo라 clone은 무인증 — 토큰은 push 원격 URL에만 넣는다
          git clone --depth 1 https://github.com/songyaeji/songyaeji.github.io.git /tmp/portfolio
          mkdir -p "/tmp/portfolio/public/trend/$DATE" /tmp/portfolio/src/content/trend
          cp out/trend/card_*.png "/tmp/portfolio/public/trend/$DATE/"
          cp out/trend/meta.json "/tmp/portfolio/src/content/trend/$DATE.json"
          cd /tmp/portfolio
          git remote set-url origin \
            "https://x-access-token:${PORTFOLIO_PUSH_TOKEN}@github.com/songyaeji/songyaeji.github.io.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/trend src/content/trend
          if git diff --cached --quiet; then
            echo "변경 없음 — 게시 스킵"
            exit 0
          fi
          git commit -m "content: Trend NO.$ISSUE ($DATE)"
          for attempt in 1 2; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "portfolio push attempt $attempt failed"
          done
          exit 1

      # 어떤 step이든 실패하면(수집 hang의 step timeout 포함) Discord로
      # 즉시 알림 — 카드뉴스 부재로 뒤늦게 사고를 인지하던 패턴 제거
      # (2026-07-10: digest hang을 발행 실패로만 알게 됨). run URL은
      # github 컨텍스트 값이라 인젝션 벡터 아님. webhook 미등록이면 스킵.
      - name: Notify failure to Discord
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_MODE: ${{ steps.run_mode.outputs.mode }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL 미등록 — 알림 스킵"
            exit 0
          fi
          python3 - <<'PY'
          import json, os, urllib.request
          payload = {"content": (
              ":warning: collect 워크플로 실패 "
              f"(mode={os.environ.get('RUN_MODE') or '?'})\n"
              f"{os.environ['RUN_URL']}"
          )}
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req, timeout=10)
          print("실패 알림 발송됨")
          PY
